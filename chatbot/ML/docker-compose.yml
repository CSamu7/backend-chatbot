services:
  db-mysql:
    image: mysql:oraclelinux9
    container_name: "chatbot-db"
    restart: always
    env_file:
      - ./.env
    environment:
      - MYSQL_DATABASE
      - MYSQL_ROOT_PASSWORD
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 5


  backend:
    container_name: myapp
    build:
      context: ./../../
      dockerfile: ./chatbot/ML/Dockerfile
    env_file:
      - ./../../.env
    ports:
      - 8000:8000
    volumes:
      - ./../../:/app/backend
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  ml_models: