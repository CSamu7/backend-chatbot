     # - app-net
    #environment:
     # - NODE_ENV=development
    #depends_on:
      #- backend
  reverse_proxy:
    image: "nginx:stable-perl"
    restart: unless-stopped
    ports:
      - "8080:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
networks:
  app-net:
    name: "nat"
